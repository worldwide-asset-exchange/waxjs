<!DOCTYPE html>
<html>

<script src='waxjs.js'></script>

<title>waxjs demo</title>

<body>

<h1>wax signing lib example.</h1>

<p>this is a library test.</p>

<p>Click the buttons</p>

<button id="login" onclick=login() >WAX Login</button>
<button id="sign" onclick=sign() >Sign transaction</button>

<h2 id="response"></h2>


<p id="demo"></p>


<script>
  // const wax = new waxjs.WaxJS({
  //   rpcEndpoint: 'https://wax.greymass.com',
  //   tryAutoLogin: true,
  //   waxSigningURL: 'https://all-access.wax.io',
  //   waxAutoSigningURL: 'https://api-idm.wax.io/v1/accounts/auto-accept/'
  // });
  const wax = new waxjs.WaxJS({
    rpcEndpoint: 'http://wax-all.test:8888',
    tryAutoLogin: true,
    waxSigningURL: 'http://all-access.wax.test:8113',
    waxAutoSigningURL: 'http://idm.wax.test:8113/v1/accounts/auto-accept/'
  });

  async function login() {
    try {
      const userAccount = await wax.login();
      document.getElementById('response').append(userAccount);
    } catch(e) {
      document.getElementById('response').append(e.message);
    }
  }

  async function sign() {
    if(!wax.api) {
      return document.getElementById('response').append('* Login first *');
    }

    try {
      const result = await wax.api.transact({
        actions: [{
          account: 'eosio.token',
          name: 'transfer',
          authorization: [{
            actor: wax.userAccount,
            permission: 'active',
          }],
          data: {
            from: wax.userAccount,
            to: 'eosio',
            quantity: '0.00000001 WAX',
            memo: 'test send ' + Math.floor((Math.random() * 1000000))
          },
        }]
      }, {
        blocksBehind: 3,
        expireSeconds: 30
      });
      document.getElementById('response').append(JSON.stringify(result))
    } catch(e) {
      document.getElementById('response').append(e.message);
    }
  }

</script>
</body>
</html>
